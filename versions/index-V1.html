<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The X‑Files</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    h2 { background: #111; color: white; padding: 10px; margin: 0; }
    .episode { border-bottom: 1px solid #ccc; padding: 10px; }
    .episode img { float: left; margin-right: 15px; width: 120px; }
    .clear { clear: both; }
  </style>
</head>
<body>

<h1>Guía de Episodios – The X‑Files</h1>
<div id="episodes"></div>

<script>
fetch('https://api.tvmaze.com/shows/430/episodes')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('episodes');

    // Agrupar por temporada
    const seasons = {};
    data.forEach(ep => {
      const s = ep.season;
      if (!seasons[s]) seasons[s] = [];
      seasons[s].push(ep);
    });

    // Mostrar por temporada
    for (let season in seasons) {
      const h = document.createElement('h2');
      h.textContent = 'Temporada ' + season;
      container.appendChild(h);

      seasons[season].forEach(ep => {

        const div = document.createElement('div');
        div.className = 'episode';

        const title = document.createElement('h3');
        title.textContent = `E${ep.number}: ${ep.name}`;
        div.appendChild(title);

        if (ep.image && ep.image.medium) {
          const img = document.createElement('img');
          img.src = ep.image.medium;
          div.appendChild(img);
        }

        const sum = document.createElement('p');
        sum.innerHTML = ep.summary || 'Sin resumen';
        div.appendChild(sum);

        const clear = document.createElement('div');
        clear.className = 'clear';
        div.appendChild(clear);

        container.appendChild(div);
      });
    }
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
